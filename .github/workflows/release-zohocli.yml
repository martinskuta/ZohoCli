name: Release ZohoCLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag override (defaults to v<computed version>)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          $versionFile = ".release-version"
          if (-not (Test-Path $versionFile)) {
            throw "Version file '$versionFile' was not found."
          }

          $majorMinor = (Get-Content -Path $versionFile -Raw).Trim()
          if ($majorMinor -notmatch '^\d+\.\d+$') {
            throw "Version file '$versionFile' must contain Major.Minor (for example 1.2)."
          }

          $tagPrefix = "v$majorMinor."
          $maxPatch = -1
          foreach ($existingTag in @(git tag --list "$tagPrefix*")) {
            $patchText = $existingTag.Substring($tagPrefix.Length)
            if ($patchText -notmatch '^\d+$') {
              continue
            }

            $patchCandidate = [int]$patchText
            if ($patchCandidate -gt $maxPatch) {
              $maxPatch = $patchCandidate
            }
          }

          $version = "$majorMinor.$($maxPatch + 1)"
          $assemblyVersion = "$version.0"
          $tag = $env:INPUT_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v$version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT

      - name: Publish AOT executable
        shell: pwsh
        run: |
          dotnet publish .\ZohoCLI\ZohoCLI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishAot=true `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            /p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            /p:InformationalVersion=${{ steps.version.outputs.version }} `
            -o .\artifacts\publish

      - name: Prepare zcli.exe
        id: asset
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts\publish"
          $sourceExe = Join-Path $publishDir "ZohoCLI.exe"

          if (-not (Test-Path $sourceExe)) {
            $publishExes = @(Get-ChildItem -Path $publishDir -File -Filter "*.exe")
            if ($publishExes.Count -ne 1) {
              Write-Error "Expected ZohoCLI.exe or a single executable in publish output; found $($publishExes.Count)."
              exit 1
            }

            $sourceExe = $publishExes[0].FullName
          }

          $releaseDir = Join-Path $PWD "artifacts\release"
          New-Item -Path $releaseDir -ItemType Directory -Force | Out-Null

          $assetPath = Join-Path $releaseDir "zcli.exe"
          Copy-Item -Path $sourceExe -Destination $assetPath -Force
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ steps.version.outputs.tag }}" "${{ steps.asset.outputs.asset_path }}" `
            --title "${{ steps.version.outputs.tag }}" `
            --generate-notes `
            --latest `
            --target "${{ github.sha }}"
